<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${asociacion.id != null} ? 'Editar Asociación' : 'Nueva Asociación'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #00d2ff;
        }

        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            align-items: center;
        }

        .form-card { 
            max-width: 500px; 
            margin: auto; 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header-custom {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
        }

        .form-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        /* Inputs Estilizados */
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white !important;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.25rem rgba(0, 210, 255, 0.25);
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Botones */
        .btn-save {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--accent-color);
            border-radius: 12px 0 0 12px;
        }

        .form-control-with-icon {
            border-radius: 0 12px 12px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <div class="card-header-custom">
            <h4 class="mb-0">
                <i class="fas fa-building me-2"></i> 
                <span th:text="${asociacion.id != null} ? 'Editar Asociación' : 'Nueva Asociación'"></span>
            </h4>
        </div>
        
        <div class="p-4 p-md-5">
            <form action="/asociacion/guardar" method="post" th:object="${asociacion}">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-4">
                    <label class="form-label">Nombre de la Asociación</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                        <input type="text" class="form-control form-control-with-icon" 
                               th:field="*{nombre}" placeholder="Ej: FIFA, UEFA..." required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">País Sede</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-globe-americas"></i></span>
                        <input type="text" class="form-control form-control-with-icon" 
                               th:field="*{pais}" placeholder="Ej: Suiza" required>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label">Presidente Actual</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user-tie"></i></span>
                        <input type="text" class="form-control form-control-with-icon" 
                               th:field="*{presidente}" placeholder="Nombre del directivo" required>
                    </div>
                </div>

                <div class="d-grid gap-3 d-md-flex justify-content-md-end">
                    <a href="/asociaciones" class="btn btn-cancel">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </a>
                    <button type="submit" class="btn btn-save btn-primary">
                        <i class="fas fa-save me-2"></i>Guardar Asociación
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
