<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${competicion.id != null} ? 'Editar Competición' : 'Nueva Competición'"></title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --gold-accent: #ffc107;
            --gold-glow: rgba(255, 193, 7, 0.2);
        }

        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            align-items: center;
        }

        .form-card { 
            max-width: 550px; 
            margin: auto; 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .header-section {
            background: linear-gradient(45deg, #b8860b, var(--gold-accent));
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-section h4 {
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold-accent);
            margin-bottom: 0.6rem;
        }

        /* Inputs y Selects */
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white !important;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--gold-accent);
            box-shadow: 0 0 0 0.25rem var(--gold-glow);
            outline: none;
        }

        /* Iconos de input group */
        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--gold-accent);
            border-radius: 12px 0 0 12px;
        }

        .form-control-with-icon {
            border-radius: 0 12px 12px 0;
        }

        /* Calendario personalizado (Chrome/Edge) */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(100%) saturate(1000%) hue-rotate(10deg);
            cursor: pointer;
        }

        /* Botones */
        .btn-save {
            background: linear-gradient(45deg, #b8860b, var(--gold-accent));
            border: none;
            border-radius: 14px;
            padding: 1rem 2.5rem;
            font-weight: 700;
            color: #000;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 193, 7, 0.3);
            filter: brightness(1.1);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 14px;
            padding: 1rem 2rem;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <div class="header-section">
            <h4>
                <i class="fas fa-trophy me-2"></i> 
                <span th:text="${competicion.id != null} ? 'Editar Competición' : 'Nueva Competición'"></span>
            </h4>
        </div>
        
        <div class="p-4 p-md-5">
            <form action="/competicion/guardar" method="post" th:object="${competicion}">
                <input type="hidden" th:field="*{id}"/>

                <!-- Nombre -->
                <div class="mb-4">
                    <label class="form-label">Nombre del Torneo</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-medal"></i></span>
                        <input type="text" class="form-control form-control-with-icon" 
                               th:field="*{nombre}" placeholder="Ej: Champions League" required>
                    </div>
                </div>

                <!-- Monto Premio -->
                <div class="mb-4">
                    <label class="form-label">Bolsa de Premios ($)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-dollar-sign"></i></span>
                        <input type="number" class="form-control form-control-with-icon" 
                               th:field="*{montoPremio}" placeholder="0.00" required>
                    </div>
                </div>

                <!-- Fechas -->
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Fecha Inicio</label>
                        <input type="date" class="form-control" th:field="*{fechaInicio}" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Fecha Fin</label>
                        <input type="date" class="form-control" th:field="*{fechaFin}" required>
                    </div>
                </div>

                <!-- Acciones -->
                <div class="d-grid gap-3 d-md-flex justify-content-md-end mt-4">
                    <a href="/competiciones" class="btn btn-cancel">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </a>
                    <button type="submit" class="btn btn-save">
                        <i class="fas fa-save me-2"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
