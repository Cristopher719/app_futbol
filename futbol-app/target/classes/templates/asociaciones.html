<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Asociaciones de Fútbol</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #00d2ff;
        }

        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* Navbar moderna */
        .navbar { 
            background: rgba(0, 0, 0, 0.5) !important; 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
        }

        .navbar-brand { font-weight: 700; letter-spacing: 1px; }

        /* Tarjeta con Efecto Glassmorphism */
        .table-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            overflow: hidden;
            margin-bottom: 50px;
        }

        .card-header-custom {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Estilos de Tabla */
        .table { color: white; margin-bottom: 0; }
        .table thead th { 
            background: rgba(0, 0, 0, 0.2);
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: none;
            padding: 1.2rem;
        }
        .table td { 
            vertical-align: middle; 
            padding: 1.2rem;
            border-color: var(--glass-border);
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
        }
        .table-hover tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        /* Badges y Botones */
        .badge-country {
            background: linear-gradient(45deg, #17a2b8, #00d2ff);
            border: none;
            padding: 0.5em 1em;
            border-radius: 8px;
        }

        .btn-action {
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .btn-action:hover { transform: translateY(-3px); }

        /* Botón Flotante */
        .btn-floating { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-floating:hover {
            transform: scale(1.1) rotate(90deg);
            color: white;
            box-shadow: 0 15px 25px rgba(0, 210, 255, 0.4);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-futbol me-2"></i> FÚTBOL<span class="text-info">APP</span></a>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-link text-light text-decoration-none">Inicio</a>
            <a href="/clubes" class="btn btn-outline-info btn-sm px-3">Clubes</a>
            <a href="/entrenadores" class="btn btn-outline-info btn-sm px-3">Entrenadores</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="table-card">
        <div class="card-header-custom">
            <h4 class="mb-0"><i class="fas fa-building me-2"></i> Asociaciones</h4>
            <span class="badge bg-dark" th:text="${#lists.size(asociaciones)} + ' Registros'"></span>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre de Asociación</th>
                        <th>País</th>
                        <th>Presidente</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${asociaciones.empty}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <i class="fas fa-folder-open d-block mb-2 fa-2x"></i>
                            No hay asociaciones registradas actualmente
                        </td>
                    </tr>
                    <tr th:each="a : ${asociaciones}">
                        <td th:text="${a.id}" class="fw-light" style="opacity: 0.6;"></td>
                        <td><strong th:text="${a.nombre}" class="text-white"></strong></td>
                        <td><span class="badge badge-country" th:text="${a.pais}"></span></td>
                        <td>
                            <div class="d-flex align-items-center">
                                <i class="fas fa-user-tie me-2 text-info"></i>
                                <span th:text="${a.presidente}"></span>
                            </div>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/asociacion/editar/{id}(id=${a.id})}" class="btn btn-action btn-primary me-1" title="Editar">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/asociacion/eliminar/{id}(id=${a.id})}" class="btn btn-action btn-danger" 
                               onclick="return confirm('¿Estás seguro de eliminar esta asociación?')" title="Eliminar">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<a href="/asociacion/nuevo" class="btn-floating" title="Agregar Nueva Asociación">
    <i class="fas fa-plus"></i>
</a>

</body>
</html>
