<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Lista de Clubes</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --club-accent: #ff416c; /* Un rojo más vibrante para el modo oscuro */
        }

        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* Navbar con desenfoque */
        .navbar { 
            background: rgba(0, 0, 0, 0.4) !important; 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }

        /* Contenedor Principal (Glassmorphism) */
        .table-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            margin-bottom: 80px;
        }

        .header-gradient {
            background: linear-gradient(90deg, rgba(195, 20, 50, 0.8), rgba(36, 11, 54, 0.8));
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        /* Estilo de la Tabla */
        .table { color: white; margin-bottom: 0; }
        .table thead th { 
            background: rgba(0, 0, 0, 0.3);
            color: var(--club-accent);
            border: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            padding: 1.2rem;
        }
        .table td { 
            padding: 1.2rem;
            border-color: var(--glass-border);
            vertical-align: middle;
            background: transparent;
        }
        .table-hover tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s ease;
        }

        /* Chips y Badges */
        .badge-year {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: #ddd;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
        }

        .coach-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        /* Botones de acción */
        .btn-action {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: none;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.3); }

        /* Botón Flotante */
        .btn-floating { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            background: linear-gradient(45deg, #c31432, #ff416c); 
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px; 
            box-shadow: 0 8px 25px rgba(195, 20, 50, 0.5);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 1000;
        }
        .btn-floating:hover {
            transform: scale(1.1) rotate(90deg);
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-futbol me-2 text-danger"></i> FÚTBOL<span class="text-secondary">APP</span></a>
        <div class="d-flex gap-3">
            <a href="/" class="btn btn-link text-light text-decoration-none">Inicio</a>
            <a href="/club/nuevo" class="btn btn-danger btn-sm rounded-pill px-3">Nuevo Club</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="table-card">
        <div class="header-gradient d-flex justify-content-between align-items-center">
            <h4 class="mb-0 fw-bold"><i class="fas fa-shield-alt me-2"></i> Clubes Registrados</h4>
            <span class="badge rounded-pill bg-dark" th:text="${#lists.size(clubes)} + ' equipos'"></span>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre del Club</th>
                        <th>Ubicación</th>
                        <th>Fundación</th>
                        <th>Director Técnico</th>
                        <th class="text-end">Opciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${clubes.empty}">
                        <td colspan="6" class="text-center py-5">
                            <div class="opacity-50">
                                <i class="fas fa-search fa-3x mb-3"></i>
                                <p>No se encontraron clubes en la base de datos</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="club : ${clubes}">
                        <td th:text="${club.id}" class="text-muted fw-light"></td>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="bg-danger rounded-circle me-3" style="width: 10px; height: 10px;"></div>
                                <strong th:text="${club.nombre}"></strong>
                            </div>
                        </td>
                        <td><i class="fas fa-map-marker-alt me-2 text-info small"></i><span th:text="${club.ciudad}"></span></td>
                        <td><span class="badge-year" th:text="${club.anioFundacion}"></span></td>
                        <td>
                            <div class="coach-info">
                                <i class="fas fa-user-circle text-secondary"></i>
                                <span th:text="${club.entrenador != null ? club.entrenador.nombre + ' ' + club.entrenador.apellido : 'Vacante'}"
                                      th:classappend="${club.entrenador == null ? 'fst-italic text-muted' : ''}"></span>
                            </div>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/club/editar/{id}(id=${club.id})}" class="btn-action btn-primary me-2" title="Editar">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/club/eliminar/{id}(id=${club.id})}" class="btn-action btn-danger" 
                               onclick="return confirm('¿Deseas eliminar este club permanentemente?')" title="Eliminar">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<a href="/club/nuevo" class="btn-floating" title="Añadir Club">
    <i class="fas fa-plus"></i>
</a>

</body>
</html>
