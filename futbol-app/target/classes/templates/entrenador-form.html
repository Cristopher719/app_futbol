<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${entrenador.id != null} ? 'Editar Entrenador' : 'Nuevo Entrenador'"></title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --coach-accent: #00d2ff;
            --coach-primary: #007bff;
        }

        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }

        .form-card { 
            max-width: 600px; 
            margin: auto; 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            background: linear-gradient(45deg, var(--coach-primary), var(--coach-accent));
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-section h4 {
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--coach-accent);
            margin-bottom: 0.5rem;
        }

        /* Estilo de Inputs */
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white !important;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--coach-accent);
            box-shadow: 0 0 0 0.25rem rgba(0, 210, 255, 0.2);
            outline: none;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--coach-accent);
            border-radius: 12px 0 0 12px;
        }

        .form-control-with-icon {
            border-radius: 0 12px 12px 0;
        }

        /* Botones */
        .btn-save {
            background: linear-gradient(45deg, var(--coach-primary), var(--coach-accent));
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .section-divider {
            height: 1px;
            background: var(--glass-border);
            margin: 2rem 0 1.5rem 0;
            position: relative;
        }

        .section-divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a323c; /* Color sólido para tapar la línea */
            padding: 0 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <div class="header-section">
            <h4>
                <i class="fas fa-user-tie me-2"></i>
                <span th:text="${entrenador.id != null} ? 'EDITAR ENTRENADOR' : 'REGISTRAR ENTRENADOR'"></span>
            </h4>
        </div>
        
        <div class="p-4 p-md-5">
            <form action="/entrenador/guardar" method="post" th:object="${entrenador}">
                <input type="hidden" th:field="*{id}"/>

                <div class="row">
                    <!-- Nombre -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej: Pep" required>
                    </div>
                    <!-- Apellido -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-control" th:field="*{apellido}" placeholder="Ej: Guardiola" required>
                    </div>
                </div>

                <div class="section-divider">
                    <span>Ficha Técnica</span>
                </div>

                <div class="row">
                    <!-- Edad -->
                    <div class="col-md-4 mb-4">
                        <label class="form-label">Edad</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-birthday-cake"></i></span>
                            <input type="number" class="form-control form-control-with-icon" th:field="*{edad}" min="18" max="99" required>
                        </div>
                    </div>
                    <!-- Nacionalidad -->
                    <div class="col-md-8 mb-4">
                        <label class="form-label">Nacionalidad</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-globe"></i></span>
                            <input type="text" class="form-control form-control-with-icon" th:field="*{nacionalidad}" placeholder="Ej: Española" required>
                        </div>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="d-grid gap-3 d-md-flex justify-content-md-end mt-4">
                    <a href="/entrenadores" class="btn btn-cancel">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </a>
                    <button type="submit" class="btn btn-save btn-primary">
                        <i class="fas fa-save me-2"></i>Guardar Perfil
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
