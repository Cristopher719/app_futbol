<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 Cuerpo Técnico - Entrenadores</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --coach-accent: #00d2ff;
            --coach-primary: #007bff;
        }

        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* Navbar Glass */
        .navbar { 
            background: rgba(0, 0, 0, 0.4) !important; 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }

        /* Card de Entrenadores */
        .table-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            margin-bottom: 80px;
        }

        .header-gradient {
            background: linear-gradient(90deg, rgba(0, 123, 255, 0.3), transparent);
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Estilos de Tabla */
        .table { color: white; margin-bottom: 0; }
        .table thead th { 
            background: rgba(0, 0, 0, 0.3);
            color: var(--coach-accent);
            border: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            padding: 1.2rem;
        }
        .table td { 
            padding: 1.2rem;
            border-color: var(--glass-border);
            vertical-align: middle;
            background: transparent;
        }
        .table-hover tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s ease;
        }

        /* Badge Nacionalidad */
        .badge-nat {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--coach-accent);
            color: var(--coach-accent);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        /* Edad Circle */
        .age-indicator {
            width: 35px;
            height: 35px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* Botones de Acción */
        .btn-action {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: none;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Botón Flotante */
        .btn-floating { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            background: linear-gradient(45deg, var(--coach-primary), var(--coach-accent)); 
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px; 
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.4);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 1000;
        }
        .btn-floating:hover {
            transform: scale(1.1) rotate(90deg);
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-futbol me-2 text-primary"></i> FÚTBOL<span class="text-info">APP</span></a>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-link text-light text-decoration-none btn-sm">Inicio</a>
            <a href="/clubes" class="btn btn-outline-info btn-sm px-3">Clubes</a>
            <a href="/jugadores" class="btn btn-outline-info btn-sm px-3">Jugadores</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="table-card">
        <div class="header-gradient">
            <h4 class="mb-0 fw-bold"><i class="fas fa-chalkboard-user me-2 text-primary"></i> Panel de Entrenadores</h4>
            <span class="badge rounded-pill bg-primary" th:text="${#lists.size(entrenadores)} + ' Profesionales'"></span>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>Edad</th>
                        <th>Nacionalidad</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${entrenadores.empty}">
                        <td colspan="5" class="text-center py-5">
                            <i class="fas fa-user-slash fa-3x mb-3 opacity-20"></i>
                            <p class="text-muted">No hay entrenadores registrados en el sistema</p>
                        </td>
                    </tr>
                    <tr th:each="e : ${entrenadores}">
                        <td th:text="${e.id}" class="text-muted fw-light" style="font-size: 0.8rem;"></td>
                        <td>
                            <div class="d-flex align-items-center">
                                <i class="fas fa-user-tie me-3 text-info opacity-75"></i>
                                <div>
                                    <strong class="d-block" th:text="${e.nombre} + ' ' + ${e.apellido}"></strong>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="age-indicator" th:text="${e.edad}"></div>
                        </td>
                        <td>
                            <span class="badge-nat">
                                <i class="fas fa-flag me-1 small"></i>
                                <span th:text="${e.nacionalidad}"></span>
                            </span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/entrenador/editar/{id}(id=${e.id})}" class="btn-action btn-primary me-2" title="Editar">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/entrenador/eliminar/{id}(id=${e.id})}" class="btn-action btn-danger" 
                               onclick="return confirm('¿Seguro que deseas eliminar a este entrenador?')" title="Eliminar">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<a href="/entrenador/nuevo" class="btn-floating" title="Agregar Entrenador">
    <i class="fas fa-plus"></i>
</a>

</body>
</html>
